<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ 舒爾特方格 · Cyberpunk 2077 版</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #03050b);
            font-family: 'Share Tech Mono', 'Courier New', 'Segoe UI', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
        }
        /* 動態網格掃描線 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 255, 0.03) 0px, rgba(0, 255, 255, 0.03) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 1;
        }

        .game-container {
            position: relative;
            z-index: 2;
            max-width: 620px;
            width: 100%;
            background: rgba(8, 12, 25, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 20px 18px 30px;
            border: 1px solid #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(0, 255, 255, 0.1);
            transition: all 0.2s;
        }

        /* 頭像區 Cyberpunk */
        .profile-area {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #010101cc;
            padding: 8px 16px;
            border-radius: 60px;
            margin-bottom: 20px;
            border: 1px solid #f0f;
            box-shadow: 0 0 8px #f0f, inset 0 0 4px #f0f;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #0ff;
            box-shadow: 0 0 10px #0ff;
        }
        .user-name {
            color: #0ff;
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 0 0 5px #0ff;
            letter-spacing: 1px;
        }
        .user-status {
            color: #f0f;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        /* 尺寸按鈕 - 霓虹 */
        .size-selector {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin-bottom: 22px;
        }
        .size-btn {
            background: #11151f;
            border: 1px solid #0ff;
            color: #0ff;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-family: monospace;
            cursor: pointer;
            box-shadow: 0 0 5px #0ff;
            transition: 0.1s;
            text-transform: uppercase;
        }
        .size-btn.active {
            background: #0ff;
            color: #000;
            border-color: #f0f;
            box-shadow: 0 0 15px #0ff, 0 0 5px #f0f;
            text-shadow: none;
        }
        .size-btn:active {
            transform: scale(0.96);
        }

        /* 統計面板 */
        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: #03050ad9;
            padding: 10px 16px;
            border-radius: 20px;
            margin-bottom: 28px;
            border: 1px solid #f0f;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
            backdrop-filter: blur(2px);
        }
        .stat {
            text-align: center;
            flex: 1;
        }
        .stat-label {
            font-size: 0.65rem;
            color: #ff66cc;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Orbitron', monospace;
            color: #0ff;
            text-shadow: 0 0 6px #0ff;
            line-height: 1.2;
        }
        #errorCount {
            color: #ff3366;
            text-shadow: 0 0 4px #ff3366;
        }

        /* 網格 - 科幻風格 */
        .grid {
            display: grid;
            gap: 12px;
            margin-bottom: 28px;
        }
        .cell {
            aspect-ratio: 1 / 1;
            background: #0d1020;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.6rem;
            font-family: 'Orbitron', 'Courier New', monospace;
            color: #0ff;
            text-shadow: 0 0 4px #0ff;
            cursor: pointer;
            border: 1px solid #33ccff;
            box-shadow: 0 0 6px #0ff, inset 0 0 4px rgba(0,255,255,0.3);
            transition: 0.05s linear;
            position: relative;
            background-image: radial-gradient(circle at 30% 20%, rgba(0,255,255,0.15), transparent);
        }
        .cell:active {
            transform: scale(0.97);
            box-shadow: 0 0 12px #0ff;
        }
        .cell.completed {
            background: #0a1f2a;
            border-color: #f0f;
            color: #f6f;
            text-decoration: line-through;
            text-decoration-thickness: 2px;
            text-decoration-color: #f0f;
            opacity: 0.8;
            filter: drop-shadow(0 0 3px #f0f);
        }
        /* 錯誤閃爍 - 紅色霓虹 */
        .cell.error-flash {
            animation: glitchShake 0.2s ease-in-out 0s 2;
            background-color: #d4104c;
            border-color: #ff0080;
            box-shadow: 0 0 20px #ff0080;
        }
        @keyframes glitchShake {
            0% { transform: translateX(0px); background: #ff2a6d; }
            25% { transform: translateX(-4px); background: #ff0066; }
            75% { transform: translateX(4px); background: #cc0055; }
            100% { transform: translateX(0px); background: #ff2a6d; }
        }

        /* 螢光點擊特效 (粉/藍/紫 增強 Cyberpunk 感) */
        .cell.flash-pink {
            background: #ff00aa !important;
            border-color: #ff88ff !important;
            box-shadow: 0 0 30px #ff00aa !important;
            color: white !important;
        }
        .cell.flash-blue {
            background: #00ccff !important;
            border-color: #aaffff !important;
            box-shadow: 0 0 30px #00ccff !important;
            color: black !important;
        }
        .cell.flash-purple {
            background: #b000ff !important;
            border-color: #e599ff !important;
            box-shadow: 0 0 30px #b000ff !important;
            color: white !important;
        }

        /* 控制按鈕 */
        .control-bar {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 8px;
        }
        .btn {
            background: #10131f;
            border: 1px solid #0ff;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.9rem;
            font-family: monospace;
            color: #0ff;
            text-transform: uppercase;
            box-shadow: 0 0 8px #0ff;
            cursor: pointer;
            transition: 0.05s linear;
            flex: 0.45;
            text-align: center;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 4px #0ff;
        }
        .btn-primary {
            background: #0ff;
            color: #000;
            border-color: #f0f;
            box-shadow: 0 0 12px #0ff;
        }

        .completion-message {
            text-align: center;
            margin-top: 18px;
            background: #0a101fcc;
            padding: 10px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #0ff;
            border: 1px solid #f0f;
            backdrop-filter: blur(8px);
            text-shadow: 0 0 3px #0ff;
        }
        footer {
            font-size: 0.6rem;
            text-align: center;
            margin-top: 20px;
            color: #77aaff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media (max-width: 480px) {
            .grid { gap: 8px; }
            .cell { font-size: 1.2rem; border-radius: 12px; }
            .stat-value { font-size: 1.4rem; }
            .size-btn { padding: 5px 14px; font-size: 0.85rem; }
        }
    </style>
    <script src="https://static.line-scdn.net/liff/edge/versions/2.23.1/sdk.js"></script>
</head>
<body>
<div class="game-container">
    <div class="profile-area">
        <img id="avatarImg" class="avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23333'%3E%3Ccircle cx='12' cy='8' r='4' fill='%23666'/%3E%3Cpath d='M12 14c-4 0-6 2-6 4h12c0-2-2-4-6-4z' fill='%23666'/%3E%3C/svg%3E" alt="avatar">
        <div class="user-info">
            <div class="user-name" id="userName">Loading NEON...</div>
            <div class="user-status">⚡ CYBER TRAINER</div>
        </div>
    </div>

    <div class="size-selector">
        <button class="size-btn" data-size="3">3x3</button>
        <button class="size-btn active" data-size="5">5x5</button>
        <button class="size-btn" data-size="6">6x6</button>
    </div>

    <div class="stats-panel">
        <div class="stat"><div class="stat-label">⏱️ TIME</div><div class="stat-value" id="timerDisplay">0.00</div></div>
        <div class="stat"><div class="stat-label">🏆 BEST</div><div class="stat-value" id="bestDisplay">--</div></div>
        <div class="stat"><div class="stat-label">⚠️ ERR</div><div class="stat-value" id="errorCount">0</div></div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="control-bar">
        <button class="btn" id="resetBtn">⟳ RESET</button>
        <button class="btn btn-primary" id="shuffleBtn">🌀 SHUFFLE</button>
    </div>
    <div id="messageArea" class="completion-message" style="display: none;"></div>
    <footer>🔷 1 → N 順序點擊  |  🎵 正確:叮 錯誤:嘟  </footer>
</div>

<script>
    // ========== 音效系統 (Web Audio) ==========
    class SoundFX {
        constructor() {
            this.audioCtx = null;
            this.initialized = false;
        }
        init() {
            if (this.initialized) return;
            try {
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this.initialized = true;
            } catch(e) { console.warn("Web Audio not supported"); }
        }
        playCorrect() {
            if (!this.initialized) this.init();
            if (!this.audioCtx) return;
            const now = this.audioCtx.currentTime;
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            osc.connect(gain);
            gain.connect(this.audioCtx.destination);
            osc.frequency.value = 1046.5; // C6 明亮
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.25);
        }
        playError() {
            if (!this.initialized) this.init();
            if (!this.audioCtx) return;
            const now = this.audioCtx.currentTime;
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            osc.connect(gain);
            gain.connect(this.audioCtx.destination);
            osc.frequency.value = 174.6; // F3 低音
            gain.gain.setValueAtTime(0.25, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.35);
        }
        resume() {
            if (this.audioCtx && this.audioCtx.state === 'suspended') {
                this.audioCtx.resume();
            }
        }
    }

    const sound = new SoundFX();

    // ========== 遊戲全域變數 ==========
    let currentSize = 5;
    let currentGrid = [];
    let nextNumber = 1;
    let gameActive = true;
    let startTime = null;
    let timerInterval = null;
    let errorCount = 0;
    let colorClickCount = 0;   // 用於螢光交替

    // 最佳紀錄 (分尺寸)
    let bestTimes = {
        3: localStorage.getItem('bestTime_3') ? parseFloat(localStorage.getItem('bestTime_3')) : null,
        5: localStorage.getItem('bestTime_5') ? parseFloat(localStorage.getItem('bestTime_5')) : null,
        6: localStorage.getItem('bestTime_6') ? parseFloat(localStorage.getItem('bestTime_6')) : null
    };
    for (let sz in bestTimes) {
        if (bestTimes[sz] && (bestTimes[sz] > 999 || isNaN(bestTimes[sz]))) {
            localStorage.removeItem(`bestTime_${sz}`);
            bestTimes[sz] = null;
        }
    }

    // DOM
    const gridContainer = document.getElementById('grid');
    const timerDisplay = document.getElementById('timerDisplay');
    const bestDisplay = document.getElementById('bestDisplay');
    const errorSpan = document.getElementById('errorCount');
    const resetBtn = document.getElementById('resetBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const messageDiv = document.getElementById('messageArea');
    const sizeBtns = document.querySelectorAll('.size-btn');

    function updateBestUI() {
        const best = bestTimes[currentSize];
        if (best !== null && best < 999) bestDisplay.innerText = best.toFixed(2);
        else bestDisplay.innerText = '--';
    }

    function saveBestTime(seconds) {
        if (seconds < 0 || seconds > 999) return false;
        if (bestTimes[currentSize] === null || seconds < bestTimes[currentSize]) {
            bestTimes[currentSize] = seconds;
            localStorage.setItem(`bestTime_${currentSize}`, seconds);
            updateBestUI();
            return true;
        }
        return false;
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function startTimer() {
        if (startTime !== null) return;
        startTime = Date.now();
        timerInterval = setInterval(() => {
            if (gameActive && startTime) {
                const elapsed = (Date.now() - startTime) / 1000;
                if (elapsed > 999) resetGame(false);
                else timerDisplay.innerText = elapsed.toFixed(2);
            }
        }, 100);
    }

    function generateShuffledArray(total) {
        const arr = Array.from({ length: total }, (_, i) => i + 1);
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function applyColorFlash(element) {
        const colors = ['flash-pink', 'flash-blue', 'flash-purple'];
        const colorClass = colors[colorClickCount % colors.length];
        colorClickCount++;
        element.classList.add(colorClass);
        setTimeout(() => element.classList.remove(colorClass), 180);
    }

    function renderGrid() {
        gridContainer.style.gridTemplateColumns = `repeat(${currentSize}, 1fr)`;
        gridContainer.innerHTML = '';
        for (let i = 0; i < currentGrid.length; i++) {
            const num = currentGrid[i];
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (num < nextNumber) cell.classList.add('completed');
            cell.setAttribute('data-index', i);
            cell.innerText = num;
            cell.addEventListener('click', (e) => {
                e.stopPropagation();
                sound.resume();
                handleCellClick(i, cell);
            });
            gridContainer.appendChild(cell);
        }
    }

    function handleCellClick(index, cellElement) {
        if (!gameActive) return;
        const clickedNum = currentGrid[index];
        if (clickedNum === nextNumber) {
            // 正確
            sound.playCorrect();
            applyColorFlash(cellElement);
            if (nextNumber === 1 && startTime === null) {
                startTimer();
            }
            if (!cellElement.classList.contains('completed')) {
                cellElement.classList.add('completed');
            }
            nextNumber++;
            const total = currentSize * currentSize;
            if (nextNumber > total) {
                gameActive = false;
                stopTimer();
                if (startTime) {
                    const finalTime = (Date.now() - startTime) / 1000;
                    if (finalTime > 0 && finalTime < 999) {
                        timerDisplay.innerText = finalTime.toFixed(2);
                        const isRecord = saveBestTime(finalTime);
                        messageDiv.style.display = 'block';
                        messageDiv.innerHTML = `✨ MISSION COMPLETE! ${finalTime.toFixed(2)} SEC ${isRecord ? '🎉 NEW RECORD 🎉' : ''}`;
                    }
                }
            }
        } else {
            // 錯誤
            sound.playError();
            errorCount++;
            errorSpan.innerText = errorCount;
            cellElement.classList.add('error-flash');
            setTimeout(() => cellElement.classList.remove('error-flash'), 300);
        }
    }

    function resetGame(keepNumbers = false) {
        stopTimer();
        messageDiv.style.display = 'none';
        if (!keepNumbers) {
            const total = currentSize * currentSize;
            currentGrid = generateShuffledArray(total);
        }
        nextNumber = 1;
        errorCount = 0;
        errorSpan.innerText = '0';
        gameActive = true;
        startTime = null;
        timerDisplay.innerText = '0.00';
        renderGrid();
        colorClickCount = 0;
    }

    function shuffleGame() {
        stopTimer();
        const total = currentSize * currentSize;
        currentGrid = generateShuffledArray(total);
        nextNumber = 1;
        errorCount = 0;
        errorSpan.innerText = '0';
        gameActive = true;
        startTime = null;
        timerDisplay.innerText = '0.00';
        messageDiv.style.display = 'none';
        renderGrid();
        colorClickCount = 0;
    }

    function setSize(newSize) {
        if (newSize === currentSize) return;
        currentSize = newSize;
        sizeBtns.forEach(btn => {
            if (parseInt(btn.dataset.size) === newSize) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        const total = newSize * newSize;
        currentGrid = generateShuffledArray(total);
        nextNumber = 1;
        errorCount = 0;
        errorSpan.innerText = '0';
        gameActive = true;
        startTime = null;
        timerDisplay.innerText = '0.00';
        messageDiv.style.display = 'none';
        stopTimer();
        renderGrid();
        updateBestUI();
        colorClickCount = 0;
    }

    // LINE LIFF 初始化
    async function initLIFF() {
        const LIFF_ID = '2010026891';
        try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('userName').innerText = profile.displayName || 'Neon Runner';
                const avatarImg = document.getElementById('avatarImg');
                if (avatarImg && profile.pictureUrl) avatarImg.src = profile.pictureUrl;
            } else {
                document.getElementById('userName').innerText = '訪客模式';
                liff.login();
            }
        } catch (err) {
            console.error(err);
            document.getElementById('userName').innerText = 'ERROR';
        }
    }

    function bindEvents() {
        resetBtn.addEventListener('click', () => resetGame(false));
        shuffleBtn.addEventListener('click', () => shuffleGame());
        sizeBtns.forEach(btn => {
            btn.addEventListener('click', () => setSize(parseInt(btn.dataset.size)));
        });
    }

    window.addEventListener('load', async () => {
        if (typeof liff !== 'undefined') await initLIFF();
        else document.getElementById('userName').innerText = 'LIFF ERR';
        currentSize = 5;
        currentGrid = generateShuffledArray(25);
        renderGrid();
        updateBestUI();
        bindEvents();
        sound.init();
    });
</script>
</body>
</html>
